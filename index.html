<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>VITAL OP לוח בקרה</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0D1E35; --blue:#1560BD; --blue-lt:#E8F0FE;
    --teal:#00887A; --teal-lt:#E0F4F2;
    --amber:#C45E00; --amber-lt:#FFF0E2;
    --red:#C0392B; --red-lt:#FDECEA;
    --green:#1E8449; --green-lt:#E9F7EF;
    --gray-50:#F5F6FA; --gray-100:#EAECF0; --gray-300:#BEC3CC;
    --gray-500:#6B7280; --gray-700:#374151; --gray-900:#111827;
    --white:#FFFFFF; --shadow:0 1px 4px rgba(0,0,0,.10); --radius:8px;
  }
  body {
    font-family: "Segoe UI", Arial, "Arial Hebrew", "David", sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    font-size: 13.5px;
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .04em; }
  .logo span { color: #5BB3FF; }
  .header-sep { width: 1px; height: 24px; background: rgba(255,255,255,.15); }
  .client-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }
  .client-label { color: rgba(255,255,255,.55); font-size: 11.5px; white-space: nowrap; }
  #clientSelect {
    appearance: none;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    cursor: pointer;
    min-width: 240px;
    font-family: inherit;
  }
  #clientSelect:focus { outline: none; border-color: #5BB3FF; }
  #clientSelect option { background: #1A2E4A; color: #fff; }
  .header-date { color: rgba(255,255,255,.4); font-size: 12px; margin-right: auto; white-space: nowrap; }

  /* SUBHEADER */
  .subheader {
    background: var(--white);
    border-bottom: 1px solid var(--gray-100);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 52px;
  }
  .client-info { flex: 1; }
  .client-name { font-size: 17px; font-weight: 700; color: var(--gray-900); }
  .client-meta { font-size: 11.5px; color: var(--gray-500); margin-top: 2px; }
  .stat-pills { display: flex; gap: 8px; }
  .stat-pill {
    border-radius: 20px; padding: 4px 12px;
    font-size: 11.5px; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  .pill-tasks   { background: var(--blue-lt);  color: var(--blue);  }
  .pill-notes   { background: var(--teal-lt);  color: var(--teal);  }
  .pill-actions { background: var(--amber-lt); color: var(--amber); }

  /* MAIN */
  main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 16px 20px 24px; }

  /* PANEL */
  .panel { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 460px; }
  .panel-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; border-bottom: 1px solid var(--gray-100); }
  .panel-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .icon-tasks   { background: var(--blue-lt); }
  .icon-notes   { background: var(--teal-lt); }
  .icon-actions { background: var(--amber-lt); }
  .panel-title { font-size: 13.5px; font-weight: 700; color: var(--gray-900); flex: 1; }
  .panel-count { background: var(--gray-100); color: var(--gray-500); border-radius: 20px; padding: 1px 8px; font-size: 11px; font-weight: 600; }

  /* FILTER */
  .filter-bar { padding: 8px 12px; display: flex; gap: 6px; border-bottom: 1px solid var(--gray-100); flex-wrap: wrap; justify-content: flex-end; }
  .filter-btn { background: none; border: 1px solid var(--gray-100); border-radius: 20px; padding: 3px 10px; font-size: 11.5px; font-weight: 500; cursor: pointer; color: var(--gray-500); transition: all .12s; font-family: inherit; }
  .filter-btn.active-t { background: var(--blue);  border-color: var(--blue);  color: #fff; }
  .filter-btn.active-n { background: var(--teal);  border-color: var(--teal);  color: #fff; }
  .filter-btn.active-a { background: var(--amber); border-color: var(--amber); color: #fff; }

  /* LIST */
  .item-list { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px; }
  .item-list::-webkit-scrollbar { width: 4px; }
  .item-list::-webkit-scrollbar-thumb { background: var(--gray-100); border-radius: 2px; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray-300); gap: 8px; font-size: 13px; padding: 40px 0; text-align: center; }
  .empty-icon { font-size: 32px; }

  /* SPINNER */
  .loading-state { display: flex; align-items: center; justify-content: center; height: 200px; flex-direction: column; gap: 12px; color: var(--gray-500); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--gray-100); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CARDS */
  .task-card, .note-card, .action-card {
    border: 1px solid var(--gray-100);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: var(--white);
    transition: box-shadow .15s;
    text-align: right;
  }
  .task-card:hover, .note-card:hover, .action-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .action-card { border-right: 3px solid var(--amber); }
  .action-card.done-action { border-right-color: var(--green); }
  .task-card { display: flex; align-items: flex-start; gap: 10px; flex-direction: row-reverse; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; font-weight: 600; color: var(--gray-900); line-height: 1.4; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { border-radius: 4px; padding: 1px 6px; font-size: 10.5px; font-weight: 600; }
  .badge-high   { background: var(--red-lt);   color: var(--red);   }
  .badge-med    { background: var(--amber-lt);  color: var(--amber); }
  .badge-low    { background: var(--green-lt);  color: var(--green); }
  .badge-open   { background: var(--blue-lt);   color: var(--blue);  }
  .badge-closed { background: var(--green-lt);  color: var(--green); }
  .due-date { font-size: 11px; color: var(--gray-500); }
  .due-date.overdue { color: var(--red); font-weight: 600; }
  .note-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-direction: row-reverse; }
  .note-subject { font-size: 12.5px; font-weight: 700; color: var(--gray-900); flex: 1; text-align: right; }
  .note-date { font-size: 10.5px; color: var(--gray-300); white-space: nowrap; }
  .note-body { font-size: 12.5px; color: var(--gray-700); line-height: 1.6; text-align: right; }
  .note-tag { display: inline-block; background: var(--teal-lt); color: var(--teal); font-size: 10.5px; font-weight: 600; border-radius: 4px; padding: 1px 6px; margin-top: 6px; }
  .action-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-direction: row-reverse; }
  .action-title { font-size: 13px; font-weight: 600; color: var(--gray-900); flex: 1; text-align: right; }
  .action-body { font-size: 12px; color: var(--gray-500); line-height: 1.5; text-align: right; }
  .action-footer { display: flex; align-items: center; gap: 8px; margin-top: 7px; flex-direction: row-reverse; }
  .owner-chip { font-size: 11px; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
  .avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .crm-link { font-size: 11px; color: var(--blue); text-decoration: none; background: var(--blue-lt); border-radius: 4px; padding: 2px 8px; margin-right: auto; white-space: nowrap; }
  .crm-link:hover { text-decoration: underline; }

  /* ERROR */
  .error-banner { background: var(--red-lt); color: var(--red); padding: 12px 20px; font-size: 13px; border-bottom: 1px solid #f5c6cb; display: none; text-align: right; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; }
    .header-sep { display: none; }
    #clientSelect { min-width: 0; flex: 1; }
    .header-date { width: 100%; margin-right: 0; font-size: 11px; }
    .subheader { flex-direction: column; align-items: flex-start; gap: 8px; }
    .stat-pills { flex-wrap: wrap; }
  }

  /* DONE BUTTON */
  .done-btn {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--gray-300);
    background: none; cursor: pointer; flex-shrink: 0;
    transition: all .15s; font-size: 12px; color: transparent;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .done-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-lt); }

  /* TASK SIDE ACTIONS */
  .task-side { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; align-items: flex-start; }
  .task-side .crm-link { margin-right: 0; }

  /* REMARK BUTTON */
  .remark-btn {
    background: none; border: 1px solid var(--gray-100);
    border-radius: 4px; padding: 2px 8px;
    font-size: 11px; color: var(--gray-500);
    cursor: pointer; font-family: inherit;
    transition: all .12s; white-space: nowrap;
  }
  .remark-btn:hover { background: var(--teal-lt); color: var(--teal); border-color: var(--teal); }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: none; align-items: center; justify-content: center;
    z-index: 200;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--white); border-radius: var(--radius);
    padding: 20px; width: 90%; max-width: 440px;
    box-shadow: 0 4px 24px rgba(0,0,0,.18);
    display: flex; flex-direction: column; gap: 12px;
    direction: rtl;
  }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--gray-900); }
  .modal-subtitle { font-size: 12px; color: var(--gray-500); }
  .modal textarea {
    width: 100%; border: 1px solid var(--gray-100);
    border-radius: 6px; padding: 10px 12px;
    font-family: inherit; font-size: 13px;
    resize: vertical; min-height: 100px;
    color: var(--gray-900); direction: rtl;
  }
  .modal textarea:focus { outline: none; border-color: var(--teal); }
  .modal-actions { display: flex; gap: 8px; }
  .btn-save {
    background: var(--teal); color: #fff;
    border: none; border-radius: 6px;
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-save:hover { background: #007068; }
  .btn-save:disabled { opacity: .6; cursor: not-allowed; }
  .btn-cancel {
    background: none; color: var(--gray-500);
    border: 1px solid var(--gray-100); border-radius: 6px;
    padding: 8px 16px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { background: var(--gray-50); }
</style>
</head>
<body>

<header>
  <div class="logo">VITAL <span>OP</span></div>
  <div class="header-sep"></div>
  <div class="client-wrap">
    <span class="client-label">לקוח</span>
    <select id="clientSelect"><option value="">טוען חשבונות...</option></select>
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<div id="errorBanner" class="error-banner"></div>

<div class="subheader">
  <div class="client-info">
    <div class="client-name" id="clientName">בחר לקוח</div>
    <div class="client-meta" id="clientMeta">בחר לקוח מהרשימה הנפתחת למעלה</div>
  </div>
  <div class="stat-pills">
    <div class="stat-pill pill-tasks">📋 <span id="statTasks">—</span> משימות</div>
    <div class="stat-pill pill-notes">📝 <span id="statNotes">—</span> הערות</div>
    <div class="stat-pill pill-actions">⚡ <span id="statActions">—</span> פעילויות</div>
  </div>
</div>

<main>
  <!-- TASKS -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-icon icon-tasks">📋</div>
      <div class="panel-title">משימות פתוחות</div>
      <div class="panel-count" id="taskCount">—</div>
    </div>
    <div class="filter-bar" id="taskFilters">
      <button class="filter-btn active-t" data-f="all">הכל</button>
      <button class="filter-btn" data-f="high">עדיפות גבוהה</button>
      <button class="filter-btn" data-f="overdue">באיחור</button>
    </div>
    <div class="item-list" id="taskList">
      <div class="empty-state"><div class="empty-icon">📋</div><div>בחר לקוח לטעינת משימות</div></div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-icon icon-notes">📝</div>
      <div class="panel-title">הערות</div>
      <div class="panel-count" id="noteCount">—</div>
    </div>
    <div class="filter-bar" id="noteFilters">
      <button class="filter-btn active-n" data-f="all">הכל</button>
      <button class="filter-btn" data-f="recent">אחרון</button>
    </div>
    <div class="item-list" id="noteList">
      <div class="empty-state"><div class="empty-icon">📝</div><div>בחר לקוח לטעינת הערות</div></div>
    </div>
  </div>

  <!-- ACTIVITIES -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-icon icon-actions">⚡</div>
      <div class="panel-title">פעילויות</div>
      <div class="panel-count" id="actionCount">—</div>
    </div>
    <div class="filter-bar" id="actionFilters">
      <button class="filter-btn active-a" data-f="all">הכל</button>
      <button class="filter-btn" data-f="open">פתוח</button>
      <button class="filter-btn" data-f="done">הושלם</button>
    </div>
    <div class="item-list" id="actionList">
      <div class="empty-state"><div class="empty-icon">⚡</div><div>בחר לקוח לטעינת פעילויות</div></div>
    </div>
  </div>
</main>

<!-- REMARK MODAL -->
<div class="modal-backdrop" id="remarkModal">
  <div class="modal">
    <div class="modal-title">הוספת הערה</div>
    <div class="modal-subtitle" id="remarkModalSubject"></div>
    <textarea id="remarkText" placeholder="כתוב הערה כאן..."></textarea>
    <div class="modal-actions">
      <button class="btn-save" id="saveRemarkBtn" onclick="saveRemark()">שמור</button>
      <button class="btn-cancel" onclick="closeRemarkModal()">ביטול</button>
    </div>
  </div>
</div>

<script src="https://live.zwidgets.com/js-sdk/1.3/ZohoEmbededAppSDK.min.js"></script>
<script>

// ── UTILS ─────────────────────────────────────────────────────
function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("he-IL", { day:"2-digit", month:"short", year:"numeric" });
}
function isOverdue(iso) {
  return iso && new Date(iso) < new Date();
}
function showSpinner(id) {
  document.getElementById(id).innerHTML =
    '<div class="loading-state"><div class="spinner"></div><div>טוען...</div></div>';
}
function showError(msg) {
  const b = document.getElementById("errorBanner");
  b.textContent = "שגיאה: " + msg;
  b.style.display = "block";
}

function priorityHe(p) {
  if (!p) return "רגיל";
  const m = { "high":"גבוהה", "highest":"גבוהה מאוד", "medium":"רגיל", "normal":"רגיל", "low":"נמוכה", "lowest":"נמוכה מאוד" };
  return m[p.toLowerCase()] || p;
}

// ── STATE ─────────────────────────────────────────────────────
let allTasks = [], allNotes = [], allActivities = [];
let taskFilter = "all", noteFilter = "all", actionFilter = "all";
let currentAccountId = null, remarkTaskId = null;

// ── FILTERS ───────────────────────────────────────────────────
document.getElementById("taskFilters").addEventListener("click", function(e) {
  const btn = e.target.closest(".filter-btn"); if (!btn) return;
  document.querySelectorAll("#taskFilters .filter-btn").forEach(b => b.className = "filter-btn");
  btn.classList.add("active-t");
  taskFilter = btn.dataset.f;
  renderTasks();
});
document.getElementById("noteFilters").addEventListener("click", function(e) {
  const btn = e.target.closest(".filter-btn"); if (!btn) return;
  document.querySelectorAll("#noteFilters .filter-btn").forEach(b => b.className = "filter-btn");
  btn.classList.add("active-n");
  noteFilter = btn.dataset.f;
  renderNotes();
});
document.getElementById("actionFilters").addEventListener("click", function(e) {
  const btn = e.target.closest(".filter-btn"); if (!btn) return;
  document.querySelectorAll("#actionFilters .filter-btn").forEach(b => b.className = "filter-btn");
  btn.classList.add("active-a");
  actionFilter = btn.dataset.f;
  renderActivities();
});

// ── ZOHO INIT ─────────────────────────────────────────────────
ZOHO.embeddedApp.on("PageLoad", function() {
  document.getElementById("headerDate").textContent =
    new Date().toLocaleDateString("he-IL", { weekday:"long", day:"2-digit", month:"long", year:"numeric" });
  loadAccounts();
});
ZOHO.embeddedApp.init();

// ── LOAD ACCOUNTS ─────────────────────────────────────────────
function loadAccounts() {
  ZOHO.CRM.API.getAllRecords({
    Entity: "Accounts",
    sort_order: "asc",
    sort_by: "Account_Name",
    per_page: 100,
    page: 1
  }).then(function(resp) {
    const sel = document.getElementById("clientSelect");
    sel.innerHTML = '<option value="">— בחר לקוח —</option>';

    if (!resp.data || !resp.data.length) {
      sel.innerHTML = '<option value="">לא נמצאו חשבונות ב-CRM</option>';
      return;
    }

    resp.data.forEach(function(account) {
      const opt = document.createElement("option");
      opt.value        = account.id;
      opt.textContent  = account.Account_Name;
      opt.dataset.phone    = account.Phone    || "";
      opt.dataset.industry = account.Industry || "";
      opt.dataset.owner    = account.Owner ? account.Owner.name : "";
      sel.appendChild(opt);
    });

    sel.addEventListener("change", function() {
      const opt = sel.options[sel.selectedIndex];
      if (!opt.value) return;
      loadClientData(opt.value, {
        name:     opt.textContent,
        phone:    opt.dataset.phone,
        industry: opt.dataset.industry,
        owner:    opt.dataset.owner
      });
    });

  }).catch(function(err) {
    showError("לא ניתן לטעון חשבונות — " + JSON.stringify(err));
  });
}

// ── LOAD CLIENT DATA ──────────────────────────────────────────
function loadClientData(id, meta) {
  currentAccountId = id;
  document.getElementById("clientName").textContent = meta.name;
  document.getElementById("clientMeta").textContent =
    [meta.owner    ? "אחראי: " + meta.owner    : "",
     meta.industry || "",
     meta.phone    || ""].filter(Boolean).join("  ·  ");

  ["statTasks","statNotes","statActions"].forEach(function(s) {
    document.getElementById(s).textContent = "…";
  });

  showSpinner("taskList");
  showSpinner("noteList");
  showSpinner("actionList");

  Promise.all([
    ZOHO.CRM.API.getRelatedRecords({ Entity:"Accounts", RecordID:id, RelatedList:"Tasks",      page:1, per_page:50 }),
    ZOHO.CRM.API.getRelatedRecords({ Entity:"Accounts", RecordID:id, RelatedList:"Notes",      page:1, per_page:50 }),
    ZOHO.CRM.API.getRelatedRecords({ Entity:"Accounts", RecordID:id, RelatedList:"Activities", page:1, per_page:50 })
  ]).then(function(results) {
    allTasks      = results[0].data || [];
    allNotes      = results[1].data || [];
    allActivities = results[2].data || [];

    taskFilter = noteFilter = actionFilter = "all";
    document.querySelectorAll("#taskFilters   .filter-btn").forEach(b => b.className = "filter-btn");
    document.querySelectorAll("#noteFilters   .filter-btn").forEach(b => b.className = "filter-btn");
    document.querySelectorAll("#actionFilters .filter-btn").forEach(b => b.className = "filter-btn");
    document.querySelector("#taskFilters   [data-f='all']").classList.add("active-t");
    document.querySelector("#noteFilters   [data-f='all']").classList.add("active-n");
    document.querySelector("#actionFilters [data-f='all']").classList.add("active-a");

    renderTasks();
    renderNotes();
    renderActivities();

  }).catch(function(err) {
    showError("שגיאה בטעינת נתוני לקוח — " + JSON.stringify(err));
  });
}

// ── RENDER TASKS ──────────────────────────────────────────────
function renderTasks() {
  let items = allTasks.filter(t => t.Status !== "Completed");
  if (taskFilter === "high")    items = items.filter(t => (t.Priority||"").toLowerCase() === "high");
  if (taskFilter === "overdue") items = items.filter(t => isOverdue(t.Due_Date));

  const openCount = allTasks.filter(t => t.Status !== "Completed").length;
  document.getElementById("taskCount").textContent = openCount;
  document.getElementById("statTasks").textContent = openCount;

  const list = document.getElementById("taskList");
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><div>אין משימות התואמות לסינון</div></div>';
    return;
  }

  list.innerHTML = items.map(function(t) {
    const due = t.Due_Date || "";
    const ov  = isOverdue(due);
    const p   = (t.Priority || "normal").toLowerCase();
    const bc  = p === "high" ? "badge-high" : p === "low" ? "badge-low" : "badge-med";
    return `
      <div class="task-card">
        <button class="done-btn" data-task-id="${esc(t.id)}" title="סמן כהושלם">✓</button>
        <div class="task-body">
          <div class="task-title">${esc(t.Subject || "משימה ללא שם")}</div>
          <div class="task-meta">
            <span class="badge ${bc}">${priorityHe(t.Priority)}</span>
            ${due ? `<span class="due-date ${ov?"overdue":""}">${ov?"⚠ ":""}${fmtDate(due)}</span>` : ""}
            ${t.Owner ? `<span style="font-size:11px;color:var(--gray-500)">${esc(t.Owner.name)}</span>` : ""}
          </div>
        </div>
        <div class="task-side">
          ${t.id ? `<a class="crm-link" href="https://crm.zoho.com/crm/org/activities/task/${t.id}" target="_blank">פתח ↗</a>` : ""}
          <button class="remark-btn" data-task-id="${esc(t.id)}" data-task-subject="${esc(t.Subject||'')}">+ הערה</button>
        </div>
      </div>`;
  }).join("");
}

// ── RENDER NOTES ──────────────────────────────────────────────
function renderNotes() {
  let items = [...allNotes];
  if (noteFilter === "recent") {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
    items = items.filter(n => n.Created_Time && new Date(n.Created_Time) >= cutoff);
  }
  items.sort((a,b) => new Date(b.Created_Time||0) - new Date(a.Created_Time||0));

  document.getElementById("noteCount").textContent = allNotes.length;
  document.getElementById("statNotes").textContent = allNotes.length;

  const list = document.getElementById("noteList");
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div>אין הערות התואמות לסינון</div></div>';
    return;
  }

  list.innerHTML = items.map(function(n) {
    const body    = (n.Note_Content || "").trim();
    const preview = body.length > 220 ? body.substring(0,220) + "…" : body;
    return `
      <div class="note-card">
        <div class="note-header">
          <div class="note-subject">${esc(n.Note_Title || "הערה")}</div>
          <div class="note-date">${fmtDate(n.Created_Time)}</div>
        </div>
        <div class="note-body">${esc(preview)}</div>
        ${n.Created_By ? `<span class="note-tag">${esc(n.Created_By.name)}</span>` : ""}
      </div>`;
  }).join("");
}

// ── RENDER ACTIVITIES ─────────────────────────────────────────
function renderActivities() {
  let items = [...allActivities];
  if (actionFilter === "open") items = items.filter(a => a.Status !== "Completed");
  if (actionFilter === "done") items = items.filter(a => a.Status === "Completed");

  const openCount = allActivities.filter(a => a.Status !== "Completed").length;
  document.getElementById("actionCount").textContent  = allActivities.length;
  document.getElementById("statActions").textContent  = openCount;

  const list = document.getElementById("actionList");
  if (!items.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚡</div><div>אין פעילויות התואמות לסינון</div></div>';
    return;
  }

  list.innerHTML = items.map(function(a) {
    const done = a.Status === "Completed";
    const desc = (a.Description || "").trim();
    return `
      <div class="action-card ${done?"done-action":""}">
        <div class="action-header">
          <div class="action-title">${esc(a.Subject || "פעילות")}</div>
          <span class="badge ${done?"badge-closed":"badge-open"}">${done?"הושלם":"פתוח"}</span>
        </div>
        ${desc ? `<div class="action-body">${esc(desc.substring(0,140))}${desc.length>140?"…":""}</div>` : ""}
        <div class="action-footer">
          ${a.Owner ? `<div class="owner-chip"><div class="avatar">${esc(a.Owner.name.charAt(0))}</div>${esc(a.Owner.name)}</div>` : ""}
          ${a.Due_Date ? `<span class="due-date ${isOverdue(a.Due_Date)&&!done?"overdue":""}">${fmtDate(a.Due_Date)}</span>` : ""}
          ${a.id ? `<a class="crm-link" href="https://crm.zoho.com/crm/org/activities/${a.id}" target="_blank">פתח ↗</a>` : ""}
        </div>
      </div>`;
  }).join("");
}

// ── TASK ACTIONS ──────────────────────────────────────────────
document.getElementById("taskList").addEventListener("click", function(e) {
  const doneBtn = e.target.closest(".done-btn");
  if (doneBtn && doneBtn.dataset.taskId) { markTaskDone(doneBtn.dataset.taskId); return; }
  const remarkBtn = e.target.closest(".remark-btn");
  if (remarkBtn && remarkBtn.dataset.taskId) {
    openRemarkModal(remarkBtn.dataset.taskId, remarkBtn.dataset.taskSubject || "");
  }
});

function markTaskDone(taskId) {
  ZOHO.CRM.API.updateRecord({
    Entity: "Tasks",
    APIData: { id: taskId, Status: "Completed" },
    Trigger: []
  }).then(function() {
    const task = allTasks.find(function(t) { return t.id === taskId; });
    if (task) task.Status = "Completed";
    renderTasks();
  }).catch(function(err) {
    showError("לא ניתן לעדכן משימה — " + JSON.stringify(err));
  });
}

// ── REMARK MODAL ──────────────────────────────────────────────
function openRemarkModal(taskId, taskSubject) {
  remarkTaskId = taskId;
  document.getElementById("remarkModalSubject").textContent = taskSubject || "משימה";
  document.getElementById("remarkText").value = "";
  const saveBtn = document.getElementById("saveRemarkBtn");
  saveBtn.disabled = false;
  saveBtn.textContent = "שמור";
  document.getElementById("remarkModal").classList.add("open");
  setTimeout(function() { document.getElementById("remarkText").focus(); }, 50);
}

function closeRemarkModal() {
  document.getElementById("remarkModal").classList.remove("open");
  remarkTaskId = null;
}

function saveRemark() {
  const text = document.getElementById("remarkText").value.trim();
  if (!text || !remarkTaskId) return;
  const saveBtn = document.getElementById("saveRemarkBtn");
  const subject = document.getElementById("remarkModalSubject").textContent;
  saveBtn.disabled = true;
  saveBtn.textContent = "שומר...";

  ZOHO.CRM.API.insertRecord({
    Entity: "Notes",
    APIData: {
      Note_Title: "הערה: " + subject,
      Note_Content: text,
      Parent_Id: remarkTaskId,
      $se_module: "Tasks"
    }
  }).then(function() {
    closeRemarkModal();
    if (currentAccountId) {
      ZOHO.CRM.API.getRelatedRecords({
        Entity: "Accounts", RecordID: currentAccountId,
        RelatedList: "Notes", page: 1, per_page: 50
      }).then(function(resp) {
        allNotes = resp.data || [];
        renderNotes();
      });
    }
  }).catch(function(err) {
    saveBtn.disabled = false;
    saveBtn.textContent = "שמור";
    showError("לא ניתן לשמור הערה — " + JSON.stringify(err));
  });
}

document.getElementById("remarkModal").addEventListener("click", function(e) {
  if (e.target === this) closeRemarkModal();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeRemarkModal();
});

</script>
</body>
</html>
